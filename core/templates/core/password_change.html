{% extends "core/base.html" %}
{% load static %}
{% block content %}

<div class="container mt-4" style="max-width: 500px;">

    <h2 class="mb-4">Alterar minha senha</h2>

    {% if form.errors %}
        <div class="alert alert-danger">
            Verifique os erros abaixo e tente novamente.
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Senha atual</label>
            {{ form.old_password }}
        </div>

        <div class="mb-3">
            <label class="form-label">Nova senha</label>
            {{ form.new_password1 }}
        </div>

        <div class="mb-3">
            <label class="form-label">Confirmar nova senha</label>
            {{ form.new_password2 }}
        </div>

        <button class="btn btn-primary w-100">Salvar nova senha</button>
    </form>
    <br>
    <div class="mb-3">
        <a href="{% url 'core:configuracoes' %}" class="btn btn-outline-secondary">Voltar</a>
    </div>
</div>

{% endblock %}
