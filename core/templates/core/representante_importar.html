{% extends "core/base.html" %}
{% load static %}
{% block content %}

<h2>Importar Representantes</h2>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="post" enctype="multipart/form-data" class="mb-4">
    {% csrf_token %}
    <input type="file" name="arquivo" class="form-control mb-3">
    <div class="d-flex gap-2 mt-3">
        <button class="btn btn-primary">Importar</button>
        <a href="{% url 'core:empresa_detail' empresa.id %}" class="btn btn-secondary">Voltar</a>
    </div>
</form>

<p class="mt-3">
    O arquivo, no formato CSV, deve conter cabeçalhos como:<br>
    <code>empresa;nome;cargo</code><br>
</p>

{% endblock %}
